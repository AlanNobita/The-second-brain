<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            deep: '#0B0D15',
            surface: '#13151D',
            elevated: '#1C1E2A',
            accent: { DEFAULT: '#6366F1', hover: '#5558E6', soft: 'rgba(99,102,241,0.12)' },
            cyan: { DEFAULT: '#06B6D4', soft: 'rgba(6,182,212,0.1)' },
            text: { primary: '#EDEDEF', secondary: '#8A8F98', tertiary: '#565870' },
            success: '#22C55E',
            error: '#EF4444',
            warning: '#F59E0B',
          },
          borderRadius: {
            sm: '6px', md: '10px', lg: '16px', xl: '20px',
          },
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="dark">
  <div id="app" class="flex h-full">
    <aside id="sidebar" class="glass w-[var(--sidebar-width)] flex flex-col flex-shrink-0 border-r z-20 transition-all duration-300 ease-[cubic-bezier(0.16,1,0.3,1)] max-md:fixed max-md:left-0 max-md:top-0 max-md:h-full max-md:w-[280px] max-md:-translate-x-full max-md:data-[open=true]:translate-x-0" style="border-right-color: var(--border);">
      <div class="flex items-center justify-between px-5 py-4 border-b" style="border-color: var(--border);">
        <span class="text-xs font-semibold tracking-widest uppercase" style="color: var(--text-tertiary);">Conversations</span>
        <div class="flex gap-1">
          <button id="new-chat-btn" class="w-7 h-7 flex items-center justify-center rounded-md transition-all duration-150 hover:bg-white/5 active:scale-95" title="New chat" style="color: var(--text-secondary);">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7.5 2v11M2 7.5h11"/></svg>
          </button>
          <button id="sidebar-close-btn" class="w-7 h-7 flex items-center justify-center rounded-md transition-all duration-150 hover:bg-white/5 active:scale-95 md:hidden" title="Close sidebar" style="color: var(--text-secondary);">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l7 7M11 4l-7 7"/></svg>
          </button>
        </div>
      </div>
      <div class="px-4 py-3">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2" width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.2" style="color: var(--text-tertiary);"><circle cx="6" cy="6" r="4.5"/><path d="M10 10l3.5 3.5"/></svg>
          <input id="search-input" type="text" placeholder="Search messages..." class="w-full h-9 pl-9 pr-3 text-sm rounded-lg outline-none transition-all duration-150" style="background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text);">
        </div>
      </div>
      <div id="session-list" class="flex-1 overflow-y-auto px-3 pb-3 space-y-0.5"></div>
      <div class="px-4 py-3 border-t flex items-center justify-between" style="border-color: var(--border);">
        <a href="/graph" class="flex items-center gap-2 text-xs font-medium transition-colors duration-150" style="color: var(--text-tertiary);">
          <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="7.5" cy="3.5" r="2"/><circle cx="3" cy="11.5" r="2"/><circle cx="12" cy="11.5" r="2"/><path d="M7.5 5.5v4M5 9.5l-1.2 1.2M10 9.5l1.2 1.2"/></svg>
          Knowledge Graph
        </a>
        <button id="theme-toggle" class="w-7 h-7 flex items-center justify-center rounded-md transition-all duration-150 hover:bg-white/5 active:scale-95" title="Toggle theme" style="color: var(--text-tertiary);">
          <svg id="theme-icon-dark" width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="7.5" cy="7.5" r="3"/><path d="M7.5 1v2M7.5 12v2M1 7.5h2M12 7.5h2M3 3l1.5 1.5M10.5 10.5L12 12M3 12l1.5-1.5M10.5 4.5L12 3"/></svg>
          <svg id="theme-icon-light" width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.2" style="display:none;"><path d="M7.5 1v1M7.5 13v1M1 7.5h1M13 7.5h1M3.5 3.5l.7.7M10.8 10.8l.7.7M3.5 11.5l.7-.7M10.8 4.2l.7-.7"/><circle cx="7.5" cy="7.5" r="3"/></svg>
        </button>
      </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
      <header class="flex items-center justify-between px-5 py-3 border-b" style="background: var(--surface); border-color: var(--border);">
        <div class="flex items-center gap-3">
          <button id="sidebar-toggle" class="w-8 h-8 flex items-center justify-center rounded-lg transition-all duration-150 hover:bg-white/5 active:scale-95 md:hidden" style="color: var(--text-secondary);">
            <svg width="18" height="18" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h11M2 7.5h11M2 11h11"/></svg>
          </button>
          <div class="flex items-center gap-2.5">
            <div class="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold" style="background: var(--accent-soft); color: var(--accent);">SB</div>
            <span class="text-sm font-semibold">Second Brain</span>
          </div>
        </div>
        <div class="flex items-center gap-1">
          <span id="connection-status" class="flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full" style="background: rgba(34,197,94,0.1); color: var(--success);">
            <span class="w-1.5 h-1.5 rounded-full" style="background: var(--success);"></span>
            Connected
          </span>
        </div>
      </header>

      <div id="messages" class="flex-1 overflow-y-auto px-4 md:px-8 py-6 space-y-4">
        <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center px-6">
          <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-5" style="background: var(--accent-soft);">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--accent);"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <h2 class="text-lg font-semibold mb-2">Your Second Brain</h2>
          <p class="text-sm max-w-sm" style="color: var(--text-secondary);">Type a message to start a conversation, or use <code style="color: var(--accent);">/ytsearch</code> to find YouTube videos, <code style="color: var(--accent);">/kg</code> to manage your knowledge graph.</p>
        </div>
      </div>

      <div class="px-4 md:px-8 py-4 border-t" style="background: var(--surface); border-color: var(--border);">
        <div class="max-w-3xl mx-auto flex gap-3 items-end">
          <div class="flex-1 relative">
            <textarea id="user-input" rows="1" placeholder="Type a message..." class="w-full resize-none outline-none text-sm leading-relaxed py-3 px-4 rounded-xl transition-all duration-150" style="background: var(--elevated); border: 1px solid var(--border); color: var(--text); min-height: 48px; max-height: 200px;" autofocus></textarea>
          </div>
          <button id="send-btn" disabled class="w-12 h-12 flex items-center justify-center rounded-xl transition-all duration-150 active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0" style="background: var(--accent); color: white;">
            <svg id="send-icon" width="18" height="18" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 7.5h13M8 2l6 5.5L8 13"/></svg>
            <svg id="send-spinner" width="18" height="18" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none;"><circle cx="7.5" cy="7.5" r="5" stroke-dasharray="31.4" stroke-dashoffset="10" style="animation: spin 0.8s linear infinite; transform-origin: center;"/></svg>
          </button>
        </div>
        <div class="max-w-3xl mx-auto mt-2 text-xs text-center" style="color: var(--text-tertiary);">
          AI responses are powered by OpenCode Zen &middot; <span class="inline-flex items-center gap-1">/ytsearch, /kg, /reflections, /reflection-today</span>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/static/js/utils.js"></script>
  <script type="module" src="/static/js/chat.js"></script>
</body>
</html>
